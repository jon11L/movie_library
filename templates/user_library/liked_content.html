{% extends "base.html" %}

{% block content %}
{% load static %}

<div class="container-fluid my-4">
    <div class="custom-wide">
        <div class="row">

            <!-- Left section of the screen -->
            <aside class="custom-col-1-5 side-wrapper">
                <div></div>
            </aside>
            
            
            <!-- Main/middle section of the screen -->
            <main class="custom-col-9 main-wrapper" style="padding: 0;">

                {{ total_like }}
                <br><br>
                {% if list_media %}
                    
                    <div style=" margin-right: 30px; color: bisque;">
                        <p><strong>liked on:</strong> {{ item.liked_on }}</p>
                    </div>
                    
                    <div id="media-list">
                    {% include "partials/media_list.html" %}
                    </div>
                    
                        
                
                {% else %}
                <h5 style="text-align: center;">No content liked yet...</h5>
                {% endif %}
            </main>

            <aside class="custom-col-1-5 side-wrapper">
                <div></div>
            </aside>
                
{% endblock %}
