

<!-- Delete Comment Confirmation Modal -->
<div class="modal fade" id="deleteCommentModal" data-bs-backdrop="static" tabindex="-1" aria-labelledby="deleteCommentModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: rgb(30, 30, 30); color: antiquewhite; border: 2px solid rgb(21, 49, 49);">

            <div class="modal-header" style="border-bottom: 1px solid rgb(57, 56, 55);">
                <h5 class="modal-title" id="deleteCommentModalLabel">
                    <i class="fa fa-trash" style="color: tomato; margin-right: 0.4rem;"></i>
                    Delete Comment
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body" style="color: rgb(200, 196, 190);">
                Are you sure you want to delete this comment? This action cannot be undone.
            </div>

            <div class="modal-footer" style="border-top: 1px solid rgb(57, 56, 55);">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">
                    Cancel
                </button>
                <button type="button" class="btn btn-danger btn-sm" id="confirmDeleteBtn">
                    <i class="fa fa-trash me-1"></i> Delete
                </button>
            </div>

        </div>
    </div>
</div>
